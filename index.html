<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$GOD • Can you take me higher?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
        .god-gradient {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-[#0a0a0f] text-white">

    <!-- Navbar -->
    <nav class="border-b border-white/10 bg-[#0a0a0f]/95 backdrop-blur-lg fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center gap-x-3">
                    <img src="logo.jpg" alt="$GOD Logo" class="w-11 h-11 rounded-2xl object-cover border border-white/20">
                    <span class="font-display text-3xl font-bold tracking-tighter">$GOD</span>
                </div>
                <a href="https://pump.fun/23esBnMRpkf1taAv84MoLZrX6cw2Q2DYbVmpFjqAKqjk" 
                   target="_blank"
                   class="gold-button flex items-center gap-x-2 px-6 py-3 rounded-2xl text-sm font-bold">
                    <i class="fas fa-rocket"></i>
                    <span>Buy $GOD</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- BANNER -->
    <div class="w-full overflow-hidden">
        <img 
            src="banner.jpg" 
            alt="GOD Banner" 
            class="w-full h-auto object-cover"
            style="max-height: 500px;"
        >
    </div>

    <!-- Hero -->
    <section class="pt-10 pb-16 px-6 text-center">
        <div class="max-w-5xl mx-auto">
            <h1 class="text-7xl md:text-8xl font-display font-black tracking-tighter leading-none mb-4">
                Can you take me<br><span class="god-gradient">higher?</span>
            </h1>
            <p class="text-2xl text-white/70 mb-8">The one true $GOD on Solana.</p>
            
            <a href="https://pump.fun/23esBnMRpkf1taAv84MoLZrX6cw2Q2DYbVmpFjqAKqjk" 
               target="_blank"
               class="gold-button inline-flex items-center gap-x-3 px-10 py-4 rounded-3xl text-lg font-bold">
                <i class="fas fa-rocket"></i>
                <span>Buy on pump.fun</span>
            </a>
        </div>
    </section>

    <!-- Judas Tracker -->
    <section id="judas" class="bg-[#111114] border-y border-white/10 py-16">
        <div class="max-w-6xl mx-auto px-6">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h2 class="section-header flex items-center gap-x-3">
                        <i class="fas fa-user-secret text-red-500"></i> Judas Tracker
                    </h2>
                    <p class="text-white/70">Real-time • Sells above ~0.15 SOL</p>
                </div>
                <button onclick="fetchJudasData()" class="px-5 py-2 border border-white/20 rounded-2xl text-sm flex items-center gap-x-2">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                <div class="bg-[#1a1a1f] border border-white/10 rounded-3xl p-6">
                    <div class="text-white/50 text-sm">TOTAL JUDAS</div>
                    <div id="total-judas" class="text-5xl font-bold mt-1">0</div>
                </div>
                <div class="bg-[#1a1a1f] border border-white/10 rounded-3xl p-6">
                    <div class="text-white/50 text-sm">TOTAL SOLD BY JUDAS</div>
                    <div id="total-sold" class="text-5xl font-bold mt-1">Live data</div>
                </div>
                <div class="bg-[#1a1a1f] border border-white/10 rounded-3xl p-6">
                    <div class="text-white/50 text-sm">BIGGEST SELL</div>
                    <div id="biggest-sell" class="text-5xl font-bold mt-1">$--</div>
                </div>
            </div>

            <!-- Leaderboard -->
            <h3 class="font-semibold mb-3">TOP JUDAS LEADERBOARD</h3>
            <div class="bg-[#1a1a1f] border border-white/10 rounded-3xl overflow-hidden mb-8">
                <table class="w-full text-sm">
                    <thead class="text-white/50 text-xs">
                        <tr>
                            <th class="py-4 px-6 text-left">Rank</th>
                            <th class="py-4 px-6 text-left">Wallet</th>
                            <th class="py-4 px-6 text-right">Total Sold</th>
                            <th class="py-4 px-6 text-right hidden md:table-cell"># Sells</th>
                        </tr>
                    </thead>
                    <tbody id="judas-leaderboard" class="divide-y divide-white/10"></tbody>
                </table>
            </div>

            <!-- Recent Sells -->
            <h3 class="font-semibold mb-3">RECENT JUDAS SELLS</h3>
            <div id="recent-sells" class="bg-[#1a1a1f] border border-white/10 rounded-3xl divide-y divide-white/10"></div>
        </div>
    </section>

    <script>
        async function fetchJudasData() {
            try {
                const res = await fetch('/api/judas');
                const data = await res.json();
                document.getElementById('total-judas').innerText = data.stats?.totalJudas || '0';
                document.getElementById('total-sold').innerText = data.stats?.totalSold || 'Live data';
                document.getElementById('biggest-sell').innerText = data.stats?.biggestSell || '$--';
                renderLeaderboard(data.judas || []);
                renderRecentSells(data.recentSells || []);
            } catch(e) {}
        }

        function renderLeaderboard(data) {
            const tbody = document.getElementById('judas-leaderboard');
            tbody.innerHTML = data.map(item => `
                <tr>
                    <td class="py-4 px-6 font-bold text-yellow-400">#${item.rank}</td>
                    <td class="py-4 px-6"><span class="font-mono text-red-400">${item.wallet}</span></td>
                    <td class="py-4 px-6 text-right font-mono font-semibold">${item.totalSold}</td>
                    <td class="py-4 px-6 text-right text-white/60 hidden md:table-cell">${item.sells}</td>
                </tr>
            `).join('');
        }

        function renderRecentSells(data) {
            const container = document.getElementById('recent-sells');
            if (!data.length) {
                container.innerHTML = `<div class="px-6 py-4 text-white/50 text-sm">No recent sells</div>`;
                return;
            }
            container.innerHTML = data.map(sell => `
                <div class="px-6 py-4 flex justify-between text-sm">
                    <div>
                        <span class="font-mono text-red-400">${sell.wallet}</span>
                        <span class="ml-2 text-[10px] px-2 py-px bg-red-500/10 text-red-400 rounded">JUDAS</span>
                    </div>
                    <div class="text-right font-mono">
                        ${parseFloat(sell.sol).toFixed(2)} SOL 
                        <span class="text-white/40 text-xs">${sell.time}</span>
                    </div>
                </div>
            `).join('');
        }

        function init() {
            fetchJudasData();
            setInterval(fetchJudasData, 30000);
        }
        window.onload = init;
    </script>
</body>
</html>
